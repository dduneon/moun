services:
  moun-mariadb:
    image: mariadb:11
    container_name: moun-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: moun
      MARIADB_USER: moun
      MARIADB_PASSWORD: moun
    ports:
      - "3306:3306"
    volumes:
      - moun-mariadb-data:/var/lib/mysql

  moun-redis:
    image: redis:7-alpine
    container_name: moun-redis
    ports:
      - "6379:6379"
    volumes:
      - moun-redis-data:/data

  moun-minio:
    image: minio/minio:latest
    container_name: moun-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - moun-minio-data:/data

volumes:
  moun-mariadb-data:
  moun-redis-data:
  moun-minio-data:
